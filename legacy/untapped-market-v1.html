<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Untapped Market — PNW Cannabis Discovery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ===== RESET ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    /* ===== DESIGN TOKENS ===== */
    :root {
      --bg: #0e0f0d;
      --bg2: #141510;
      --surface: #1f211a;
      --surface2: #252720;
      --border: #2e3028;
      --border2: #3a3d32;
      --text: #e8e6df;
      --text2: #a8a69e;
      --text3: #6b6960;
      --accent: #7cb87a;
      --accent2: #5a9e58;
      --amber: #d4a853;
      --amber2: #b8913e;
      --red: #d4564e;
      --teal: #4a9b9e;
      --purple: #8b6fb8;
      --radius: 10px;
      --shadow: 0 2px 16px rgba(0,0,0,.45);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-weight: 400;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ===== NAV ===== */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      height: 58px;
      background: rgba(14,15,13,.88);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 1.5rem;
      gap: 0;
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 1.2rem;
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
      margin-right: auto;
      flex-shrink: 0;
    }
    .nav-logo-mark {
      font-size: 1.4rem;
      line-height: 1;
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }
    .nav-link {
      padding: 0.35rem 0.8rem;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text2);
      cursor: pointer;
      border: none;
      background: none;
      transition: color 0.15s, background 0.15s;
    }
    .nav-link:hover { color: var(--text); background: var(--surface); }
    .nav-link.active { color: var(--accent); background: rgba(124,184,122,.12); }
    .nav-link.premium { color: var(--amber); }
    .nav-link.premium:hover { background: rgba(212,168,83,.12); }
    .nav-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: var(--accent2);
      color: var(--bg);
      font-size: 0.75rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-left: 0.75rem;
      flex-shrink: 0;
    }

    /* ===== PAGE SHELL ===== */
    .page { padding-top: 58px; min-height: 100vh; }

    /* ===== HERO ===== */
    .hero {
      background: linear-gradient(160deg, #111410 0%, #0e0f0d 60%);
      border-bottom: 1px solid var(--border);
      padding: 5rem 2rem 4rem;
      text-align: center;
    }
    .hero-eyebrow {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(124,184,122,.1);
      border: 1px solid rgba(124,184,122,.25);
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      margin-bottom: 1.25rem;
    }
    .hero h1 {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: clamp(2.4rem, 5vw, 3.8rem);
      line-height: 1.12;
      color: var(--text);
      margin-bottom: 1rem;
    }
    .hero h1 em { color: var(--accent); font-style: italic; }
    .hero-sub {
      color: var(--text2);
      font-size: 1.05rem;
      max-width: 520px;
      margin: 0 auto 2rem;
    }
    .hero-search {
      display: flex;
      max-width: 500px;
      margin: 0 auto 3rem;
      gap: 0;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border2);
      background: var(--surface);
    }
    .hero-search input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      padding: 0.75rem 1.1rem;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
    }
    .hero-search input::placeholder { color: var(--text3); }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.65rem 1.25rem;
      border-radius: var(--radius);
      font-family: 'Outfit', sans-serif;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }
    .btn-primary { background: var(--accent); color: #0a1409; }
    .btn-primary:hover { background: var(--accent2); }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border2); }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    .btn-amber { background: var(--amber); color: #1a0f00; }
    .btn-amber:hover { background: var(--amber2); }
    .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--border2); color: var(--text); }
    .btn-sm { padding: 0.4rem 0.85rem; font-size: 0.8rem; }
    .btn-danger { background: var(--red); color: #fff; }

    .hero-pillars {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      max-width: 800px;
      margin: 0 auto;
    }
    @media (max-width: 640px) {
      .hero-pillars { grid-template-columns: 1fr 1fr; }
    }
    .pillar-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1rem;
      text-align: center;
    }
    .pillar-icon { font-size: 1.5rem; margin-bottom: 0.4rem; }
    .pillar-card h3 { font-size: 0.8rem; font-weight: 600; color: var(--text); margin-bottom: 0.2rem; }
    .pillar-card p { font-size: 0.72rem; color: var(--text3); line-height: 1.4; }

    /* ===== SECTIONS ===== */
    .section { padding: 3rem 2rem; max-width: 1100px; margin: 0 auto; }
    .section-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      gap: 1rem;
    }
    .section-title {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 1.6rem;
      color: var(--text);
    }
    .section-link {
      font-size: 0.8rem;
      color: var(--accent);
      cursor: pointer;
      background: none;
      border: none;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .section-link:hover { color: var(--accent2); }

    /* ===== STRAIN CARD ===== */
    .strain-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }
    .strain-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .strain-card:hover {
      border-color: var(--border2);
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }
    .strain-card-top {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .strain-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .badge {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.18rem 0.55rem;
      border-radius: 20px;
    }
    .badge-indica { background: #2d1a4a; color: #c084fc; }
    .badge-sativa { background: #1a3d1a; color: #86efac; }
    .badge-hybrid { background: #3d2d1a; color: #fcd34d; }
    .badge-cbd { background: #1a2d3d; color: #93c5fd; }
    .badge-accent { background: rgba(124,184,122,.15); color: var(--accent); }
    .badge-amber { background: rgba(212,168,83,.15); color: var(--amber); }
    .badge-teal { background: rgba(74,155,158,.15); color: var(--teal); }

    .bookmark-btn {
      margin-left: auto;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text3);
      font-size: 1.1rem;
      transition: color 0.15s;
      line-height: 1;
    }
    .bookmark-btn:hover { color: var(--amber); }
    .bookmark-btn.bookmarked { color: var(--amber); }

    .strain-name {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 1.15rem;
      color: var(--text);
      line-height: 1.2;
    }
    .strain-desc {
      font-size: 0.82rem;
      color: var(--text2);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .strain-stats {
      display: flex;
      gap: 1rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
    }
    .stat-item { color: var(--text3); }
    .stat-item span { color: var(--text); font-weight: 500; }
    .terpene-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }
    .terpene-pill {
      font-size: 0.68rem;
      padding: 0.15rem 0.5rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text3);
    }
    .effect-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }
    .effect-tag {
      font-size: 0.68rem;
      padding: 0.15rem 0.5rem;
      background: rgba(124,184,122,.08);
      border: 1px solid rgba(124,184,122,.2);
      border-radius: 20px;
      color: var(--accent);
    }
    .card-footer {
      margin-top: auto;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
      font-size: 0.78rem;
      color: var(--accent);
      cursor: pointer;
    }
    .card-footer:hover { text-decoration: underline; }

    /* ===== SPOTLIGHT ===== */
    .spotlight {
      background: var(--surface);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 3rem 2rem;
      text-align: center;
    }
    .spotlight-inner {
      max-width: 700px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
      align-items: center;
      text-align: left;
    }
    @media (max-width: 640px) { .spotlight-inner { grid-template-columns: 1fr; gap: 1.5rem; } }
    .spotlight h2 {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 2rem;
      color: var(--text);
      margin-bottom: 0.75rem;
    }
    .spotlight p { color: var(--text2); font-size: 0.9rem; margin-bottom: 1.5rem; }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .stat-block { padding: 1rem; background: var(--surface2); border-radius: var(--radius); border: 1px solid var(--border); }
    .stat-block .num {
      font-family: 'DM Mono', monospace;
      font-size: 1.6rem;
      font-weight: 500;
      color: var(--accent);
    }
    .stat-block .label { font-size: 0.72rem; color: var(--text3); }

    /* ===== CATALOG PAGE ===== */
    .catalog-layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 2rem;
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem;
    }
    @media (max-width: 768px) { .catalog-layout { grid-template-columns: 1fr; } }
    .catalog-sidebar {
      position: sticky;
      top: 78px;
      height: fit-content;
    }
    .filter-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
    }
    .filter-title {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 1rem;
    }
    .filter-group { margin-bottom: 1.25rem; }
    .filter-group-label { font-size: 0.78rem; font-weight: 600; color: var(--text2); margin-bottom: 0.5rem; }
    .filter-input {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 0.85rem;
      outline: none;
    }
    .filter-input:focus { border-color: var(--accent); }
    .filter-input::placeholder { color: var(--text3); }
    select.filter-input { cursor: pointer; }
    .type-tabs {
      display: flex;
      gap: 0.25rem;
      flex-wrap: wrap;
    }
    .type-tab {
      padding: 0.3rem 0.7rem;
      border-radius: 6px;
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: none;
      color: var(--text2);
      transition: all 0.15s;
    }
    .type-tab.active { border-color: var(--accent); color: var(--accent); background: rgba(124,184,122,.1); }
    .slider-wrap { display: flex; flex-direction: column; gap: 0.4rem; }
    .slider-label { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text3); }
    input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }
    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .results-count { font-size: 0.82rem; color: var(--text3); }

    /* ===== DETAIL PAGE ===== */
    .detail-page { max-width: 1100px; margin: 0 auto; padding: 2rem; }
    .detail-hero {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 2rem;
      margin-bottom: 2.5rem;
    }
    @media (max-width: 768px) { .detail-hero { grid-template-columns: 1fr; } }
    .detail-hero-main {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
    }
    .detail-hero-sidebar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
    }
    .detail-name {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: clamp(2rem, 4vw, 3rem);
      color: var(--text);
      margin: 0.75rem 0 0.5rem;
    }
    .detail-desc { color: var(--text2); font-size: 0.95rem; line-height: 1.65; margin-bottom: 1.5rem; }
    .detail-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .sidebar-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 0.5rem;
    }
    .potency-bar-wrap { margin-bottom: 1rem; }
    .potency-bar-bg {
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 0.3rem;
    }
    .potency-bar-fill {
      height: 100%;
      border-radius: 3px;
    }
    .potency-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.72rem;
      color: var(--text3);
      margin-top: 0.2rem;
      font-family: 'DM Mono', monospace;
    }
    .sidebar-section { margin-bottom: 1.25rem; }
    .tag-cloud { display: flex; flex-wrap: wrap; gap: 0.35rem; }

    /* ===== SECTION CARD ===== */
    .section-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem;
      margin-bottom: 1.5rem;
    }
    .section-card h2 {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 1.4rem;
      color: var(--text);
      margin-bottom: 1.25rem;
    }

    /* ===== TERPENE CHART ===== */
    .terpene-row {
      display: grid;
      grid-template-columns: 130px 1fr 90px;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.75rem;
    }
    .terpene-name { font-size: 0.85rem; font-weight: 500; color: var(--text2); }
    .terpene-effect { font-size: 0.7rem; color: var(--text3); }
    .terpene-bar-bg { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
    .terpene-bar-fill { height: 100%; border-radius: 4px; background: var(--accent); transition: width 0.6s ease; }
    .terpene-pct { font-family: 'DM Mono', monospace; font-size: 0.78rem; color: var(--text2); text-align: right; }

    /* ===== LINEAGE ===== */
    .lineage-tree {
      display: flex;
      align-items: center;
      gap: 2rem;
      flex-wrap: wrap;
    }
    .lineage-parents { display: flex; flex-direction: column; gap: 1rem; }
    .lineage-node {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      padding: 0.75rem 1.25rem;
      font-size: 0.85rem;
    }
    .lineage-node.offspring {
      border-width: 2px;
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 1.05rem;
    }
    .lineage-node.unknown { color: var(--text3); border-style: dashed; }
    .lineage-connector { font-size: 1.2rem; color: var(--text3); }

    /* ===== LAB CERT ===== */
    .lab-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 0.75rem;
    }
    .lab-cell {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
    }
    .lab-cell-name { font-size: 0.72rem; color: var(--text3); margin-bottom: 0.2rem; }
    .lab-cell-val { font-family: 'DM Mono', monospace; font-size: 1.1rem; font-weight: 500; color: var(--text); }

    /* ===== DISPENSARY CARD ===== */
    .dispensary-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .dispensary-row-info { flex: 1; min-width: 200px; }
    .dispensary-row-name { font-weight: 600; color: var(--text); margin-bottom: 0.25rem; }
    .dispensary-row-meta { font-size: 0.8rem; color: var(--text3); }
    .dispensary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
    }
    .dispensary-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 1rem; }
    .dispensary-name { font-family: 'DM Serif Display', serif; font-style: italic; font-size: 1.2rem; color: var(--text); }
    .dispensary-meta { font-size: 0.8rem; color: var(--text3); margin-bottom: 0.5rem; }
    .rating { font-size: 0.82rem; color: var(--amber); font-weight: 600; }
    .strain-chips { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.75rem; }
    .strain-chip {
      font-size: 0.72rem;
      padding: 0.2rem 0.6rem;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 20px;
      color: var(--text2);
      cursor: pointer;
    }
    .strain-chip:hover { color: var(--accent); border-color: var(--accent); }
    .dispensary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1rem;
    }

    /* ===== MAP PLACEHOLDER ===== */
    .map-placeholder {
      height: 260px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 0.5rem;
      color: var(--text3);
      margin-bottom: 1.5rem;
    }
    .map-placeholder .map-icon { font-size: 2.5rem; }
    .map-placeholder p { font-size: 0.85rem; }

    /* ===== TRIP REPORTS ===== */
    .trip-report {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 0.75rem;
    }
    .report-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.5rem; flex-wrap: wrap; }
    .report-user { font-weight: 600; font-size: 0.9rem; }
    .report-meta { font-size: 0.75rem; color: var(--text3); }
    .report-note { font-size: 0.88rem; color: var(--text2); margin: 0.5rem 0; line-height: 1.55; }
    .stars { color: var(--amber); font-size: 0.9rem; }
    .vote-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.25rem 0.6rem;
      font-size: 0.75rem;

          toast('Saved to library ✓');

        setBookmarks(next);

      return (
        <div className="strain-card" onClick={() => navigate({ page: 'strain', id: strain.id })}>

    /* ===================================================
       CATALOG PAGE
    =================================================== */
    function CatalogPage({ navigate, bookmarks, setBookmarks, route, toast }) {
      const [search, setSearch] = useState(route.query || '');
      const [type, setType] = useState('all');
      const [effect, setEffect] = useState('');
      const [minThc, setMinThc] = useState(0);
      const [sortBy, setSortBy] = useState('likes');

      const allEffects = useMemo(() => {
        const set = new Set();
        STRAINS.forEach(s => s.effects.forEach(e => set.add(e)));
        return [...set].sort();
      }, []);

      const filtered = useMemo(() => {
        let list = [...STRAINS];
        if (search) list = list.filter(s => s.name.toLowerCase().includes(search.toLowerCase()) || s.description.toLowerCase().includes(search.toLowerCase()));
        if (type !== 'all') list = list.filter(s => s.type === type);
        if (effect) list = list.filter(s => s.effects.includes(effect));
        if (minThc > 0) list = list.filter(s => s.thc >= minThc);
        if (sortBy === 'likes') list.sort((a, b) => b.likeCount - a.likeCount);
        else if (sortBy === 'thc') list.sort((a, b) => b.thc - a.thc);
        else list.sort((a, b) => a.name.localeCompare(b.name));
        return list;
      }, [search, type, effect, minThc, sortBy]);

      function clearFilters() {
        setSearch(''); setType('all'); setEffect(''); setMinThc(0); setSortBy('likes');
      }

      return (
        <div className="page">
          <div className="catalog-layout">
            <aside className="catalog-sidebar">
              <div className="filter-card">
                <div className="filter-title">Filter Strains</div>
                <div className="filter-group">
                  <div className="filter-group-label">Search</div>
                  <input className="filter-input" placeholder="Name or description…" value={search} onChange={e => setSearch(e.target.value)} />
                </div>
                <div className="filter-group">
                  <div className="filter-group-label">Type</div>
                  <div className="type-tabs">
                    {['all', 'indica', 'sativa', 'hybrid'].map(t => (
                      <button key={t} className={`type-tab${type === t ? ' active' : ''}`} onClick={() => setType(t)}>
                        {t.charAt(0).toUpperCase() + t.slice(1)}
                      </button>
                    ))}
                  </div>
                </div>
                <div className="filter-group">
                  <div className="filter-group-label">Effect</div>
                  <select className="filter-input" value={effect} onChange={e => setEffect(e.target.value)}>
                    <option value="">Any effect</option>
                    {allEffects.map(e => <option key={e} value={e}>{e}</option>)}
                  </select>
                </div>
                <div className="filter-group">
                  <div className="filter-group-label">Min THC %</div>
                  <div className="slider-wrap">
                    <div className="slider-label"><span>0%</span><span>{minThc}%</span></div>
                    <input type="range" min="0" max="30" value={minThc} onChange={e => setMinThc(Number(e.target.value))} />
                  </div>
                </div>
                <div className="filter-group">
                  <div className="filter-group-label">Sort By</div>
                  <select className="filter-input" value={sortBy} onChange={e => setSortBy(e.target.value)}>
                    <option value="likes">Most Liked</option>
                    <option value="thc">Highest THC</option>
                    <option value="alpha">A–Z</option>
                  </select>
                </div>
                <button className="btn btn-ghost w-full btn-sm" onClick={clearFilters}>Clear Filters</button>
              </div>
            </aside>
            <main>
              <div className="results-header">
                <span className="results-count">{filtered.length} strain{filtered.length !== 1 ? 's' : ''} found</span>
              </div>
              {filtered.length === 0 ? (
                <div className="empty-library" style={{ padding: '3rem 0' }}>
                  <div className="empty-icon">🔍</div>
                  <h2>No strains match your filters</h2>
                  <p>Try adjusting your search or clearing filters.</p>
                </div>
              ) : (
                <div className="strain-grid">
                  {filtered.map(s => (
                    <StrainCard key={s.id} strain={s} bookmarks={bookmarks} setBookmarks={setBookmarks} navigate={navigate} toast={toast} />
                  ))}
                </div>
              )}
            </main>
          </div>
        </div>
      );
    }

    function StrainDetailPage({ strainId, navigate, bookmarks, setBookmarks, toast }) {
      const strain = STRAINS.find(s => s.id === strainId);
      const [liked, setLiked] = useState(false);
      const [reportRating, setReportRating] = useState(0);
      const [reportMethod, setReportMethod] = useState('flower');
      const [reportNote, setReportNote] = useState('');
      const [reports, setReports] = useState(TRIP_REPORTS.filter(r => r.strainId === strainId));

      const isBookmarked = bookmarks.has(strainId);
      function toggleBookmark() {
        const next = new Set(bookmarks);
        if (isBookmarked) { next.delete(strainId); toast('Removed from library'); }
        else { next.add(strainId); toast('Saved to library ✓'); }
        setBookmarks(next);
      }

      function submitReport(e) {
        e.preventDefault();
        if (!reportNote.trim() || reportRating === 0) return;
        const newReport = {
          id: `tr-new-${Date.now()}`,
          strainId,
          userId: MOCK_USER.id,
          username: MOCK_USER.username,
          rating: reportRating,
          effects: strain.effects.slice(0, 2),
          method: reportMethod,
          note: reportNote,
          upvotes: 0,
          downvotes: 0,
          createdAt: new Date().toISOString().slice(0, 10),
        };
        setReports([newReport, ...reports]);
        setReportNote('');
        setReportRating(0);
        toast('Trip report submitted! ✓');
      }

      if (!strain) {
        return (
          <div className="page detail-page">
            <button className="back-btn" onClick={() => navigate({ page: 'catalog' })}>← Back to Strains</button>
            <p className="text-muted">Strain not found.</p>

    /* ===================================================
       APP ROUTER
    =================================================== */
    function App() {
      const [route, setRoute] = useState({ page: 'home' });
      const [bookmarks, setBookmarks] = useState(new Set());
      const [toasts, setToasts] = useState([]);

      function navigate(newRoute) {
        setRoute(newRoute);
        window.scrollTo(0, 0);
      }

      function addToast(msg) {
        const id = Date.now();
        setToasts(prev => [...prev, { id, msg, fading: false }]);
        setTimeout(() => {
          setToasts(prev => prev.map(t => t.id === id ? { ...t, fading: true } : t));
          setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 350);
        }, 2500);
      }

      function renderPage() {
        const props = { navigate, bookmarks, setBookmarks, toast: addToast, route };
        switch (route.page) {
          case 'home': return <HomePage {...props} />;
          case 'catalog': return <CatalogPage {...props} />;
          case 'strain': return <StrainDetailPage strainId={route.id} {...props} />;
          case 'finder': return <FinderPage {...props} />;
          case 'library': return <LibraryPage {...props} />;
          case 'explore': return <ExplorePage {...props} />;
          case 'premium': return <PremiumPage {...props} />;
          default: return <HomePage {...props} />;
        }
      }

      return (
        <>
          <Nav route={route} navigate={navigate} />
          {renderPage()}
          <ToastContainer toasts={toasts} />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
