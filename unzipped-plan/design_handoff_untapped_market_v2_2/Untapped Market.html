<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Untapped Market — PNW Cannabis Discovery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@300;400;500&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Raleway:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ===== RESET ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    /* ===== DESIGN TOKENS ===== */
    :root {
      /* PNW Forest — Organic Biophilic + Nature Distilled */
      --bg: #0B100A;
      --bg2: #111710;
      --surface: #1A211A;
      --surface2: #232C20;
      --border: #2F3A2A;
      --border2: #3E4D36;
      --text: #E8E2D4;
      --text2: #A89D85;
      --text3: #6D6350;
      --accent: #5E9B4D;
      --accent2: #4A7D3D;
      --amber: #C49540;
      --amber2: #A47A2C;
      --red: #B85B4A;
      --teal: #4D8B7A;
      --purple: #7B6A9E;
      --terracotta: #B86B50;
      --gold: #C49840;
      --radius: 14px;
      --shadow: 0 8px 36px rgba(11,16,10,.55);
      --glow-green: 0 0 32px rgba(94,155,77,.12);
      --glow-amber: 0 0 32px rgba(196,149,64,.10);
      --glow-earth: 0 0 44px rgba(160,110,50,.06);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Raleway', 'Segoe UI', sans-serif;
      font-weight: 400;
      line-height: 1.65;
      min-height: 100vh;
    }
    /* Grain texture overlay for organic, earthy feel */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.038;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 220px 220px;
    }

    /* ===== NAV ===== */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      height: 58px;
      background: rgba(11,16,10,.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 1.5rem;
      gap: 0;
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Lora', Georgia, serif;
      font-style: italic;
      font-size: 1.2rem;
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
      margin-right: auto;
      flex-shrink: 0;
    }
    .nav-logo-mark {
      font-size: 1.4rem;
      line-height: 1;
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }
    .nav-link {
      padding: 0.35rem 0.8rem;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text2);
      cursor: pointer;
      border: none;
      background: none;
      transition: color 0.15s, background 0.15s;
    }
    .nav-link:hover { color: var(--text); background: var(--surface); }
    .nav-link.active { color: var(--accent); background: rgba(94,155,77,.12); }
    .nav-link.premium { color: var(--amber); }
    .nav-link.premium:hover { background: rgba(196,149,64,.12); }
    .nav-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: var(--accent2);
      color: var(--bg);
      font-size: 0.75rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-left: 0.75rem;
      flex-shrink: 0;
    }

    /* ===== PAGE SHELL ===== */
    .page { padding-top: 58px; min-height: 100vh; }

    /* ===== HERO ===== */
    .hero {
      background: linear-gradient(160deg, #141E10 0%, #0F1610 40%, #0B100A 100%);
      border-bottom: 1px solid var(--border);
      padding: 5rem 2rem 4rem;
      text-align: center;
      position: relative;
      overflow: hidden;
      /* ===== PNW LANDSCAPE BACKGROUND IMAGE =====
         Replace the URL below with an authentic PNW landscape photo
         (e.g., misty Cascades, old-growth forest, Puget Sound shoreline).
         The dark overlay gradient above will maintain text readability.

         background-image: url('/images/hero-pnw-landscape.jpg');
         background-size: cover;
         background-position: center;
         background-repeat: no-repeat;

         When using a background-image, update the existing gradient to act
         as a dark overlay for text contrast:
         background: linear-gradient(160deg, rgba(20,30,16,.88) 0%, rgba(15,22,16,.92) 40%, rgba(11,16,10,.96) 100%),
                     url('/images/hero-pnw-landscape.jpg') center / cover no-repeat;
      ================================================= */
    }
    .hero::after {
      content: '';
      position: absolute;
      top: -30%;
      left: 50%;
      transform: translateX(-50%);
      width: 70%;
      height: 120%;
      background: radial-gradient(ellipse at center, rgba(94,155,77,.06) 0%, rgba(77,139,122,.04) 40%, transparent 72%);
      pointer-events: none;
    }
    .hero-eyebrow {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(94,155,77,.1);
      border: 1px solid rgba(94,155,77,.25);
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      margin-bottom: 1.25rem;
    }
    .hero h1 {
      font-family: 'Lora', Georgia, serif;
      font-style: italic;
      font-size: clamp(2.4rem, 5vw, 3.8rem);
      line-height: 1.12;
      color: var(--text);
      margin-bottom: 1rem;
    }
    .hero h1 em { color: var(--accent); font-style: italic; }
    .hero-sub {
      color: var(--text2);
      font-size: 1.05rem;
      max-width: 520px;
      margin: 0 auto 2rem;
    }
    .hero-search {
      display: flex;
      max-width: 500px;
      margin: 0 auto 3rem;
      gap: 0;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border2);
      background: var(--surface);
    }
    .hero-search input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      padding: 0.75rem 1.1rem;
      color: var(--text);
      font-family: 'Raleway', sans-serif;
      font-size: 0.95rem;
    }
    .hero-search input::placeholder { color: var(--text3); }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.65rem 1.25rem;
      border-radius: var(--radius);
      font-family: 'Raleway', sans-serif;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease-out;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: var(--accent); color: #0B100A; box-shadow: 0 2px 8px rgba(94,155,77,.20); }
    .btn-primary:hover { background: var(--accent2); box-shadow: 0 3px 12px rgba(94,155,77,.28); }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border2); }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    .btn-amber { background: var(--amber); color: #0B100A; }
    .btn-amber:hover { background: var(--amber2); }
    .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--border2); color: var(--text); }
    .btn-sm { padding: 0.4rem 0.85rem; font-size: 0.8rem; }
    .btn-danger { background: var(--red); color: #fff; }

    .hero-pillars {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      max-width: 800px;
      margin: 0 auto;
    }
    @media (max-width: 640px) {
      .hero-pillars { grid-template-columns: 1fr 1fr; }
    }
    .pillar-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px 18px 14px 16px;
      padding: 1.25rem 1rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    /* Subtle organic texture overlay for pillar cards */
    .pillar-card-textured::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.045;
      background:
        radial-gradient(ellipse at 20% 30%, rgba(94,155,77,.18) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 70%, rgba(196,149,64,.12) 0%, transparent 50%);
      background-size: 100% 100%;
      z-index: 0;
    }
    .pillar-card > * { position: relative; z-index: 1; }
    .pillar-icon { font-size: 1.5rem; margin-bottom: 0.4rem; }
    .pillar-card h3 { font-size: 0.8rem; font-weight: 600; color: var(--text); margin-bottom: 0.2rem; }
    .pillar-card p { font-size: 0.72rem; color: var(--text3); line-height: 1.4; }

    /* ===== SECTIONS ===== */
    .section { padding: 3rem 2rem; max-width: 1100px; margin: 0 auto; }
    .section-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      gap: 1rem;
    }
    .section-title {
      font-family: 'Lora', Georgia, serif;
      font-style: italic;
      font-size: 1.6rem;
      color: var(--text);
    }
    .section-link {
      font-size: 0.8rem;
      color: var(--accent);
      cursor: pointer;
      background: none;
      border: none;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .section-link:hover { color: var(--accent2); }

    /* ===== STRAIN CARD ===== */
    .strain-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }
    .strain-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    /* Localized grain texture for strain cards */
    .strain-card::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.028;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 180px 180px;
    }
    .strain-card > * { position: relative; z-index: 1; }
    .strain-card:hover {
      border-color: rgba(94,155,77,.25);
      transform: translateY(-2px);
      box-shadow: var(--shadow), var(--glow-green);
    }
    .strain-card-top {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .strain-dot {
      width: 10px; height: 10px;
      border-radius: 50% 40% 55% 45%;
      flex-shrink: 0;
      position: relative;
    }
    /* Radial highlight overlay on the organic blob dot */
    .strain-dot::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,.30), transparent 65%);
      pointer-events: none;
    }
    .badge {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.18rem 0.55rem;
      border-radius: 20px;
    }
    .badge-indica { background: #251428; color: #c08ce8; }
    .badge-sativa { background: #122812; color: #7ed67a; }
    .badge-hybrid { background: #2e1e0a; color: #e8b84a; }
    .badge-cbd { background: #0e1e2a; color: #7ec0d8; }
    .badge-accent { background: rgba(94,155,77,.14); color: var(--accent); }
    .badge-amber { background: rgba(196,149,64,.14); color: var(--amber); }
    .badge-teal { background: rgba(77,139,122,.14); color: var(--teal); }

    /* ===== LICENSE-TYPE CHIPS ===== */
    .license-chip {
      display: inline-block;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 0.18rem 0.5rem;
      border-radius: 20px;
      white-space: nowrap;
    }
    .license-chip-rec { background: rgba(94,155,77,.16); color: var(--accent); border: 1px solid rgba(94,155,77,.30); }
    .license-chip-med { background: rgba(77,139,122,.16); color: var(--teal); border: 1px solid rgba(77,139,122,.30); }
    .license-chip-both { background: rgba(196,149,64,.16); color: var(--amber); border: 1px solid rgba(196,149,64,.30); }

    .bookmark-btn {
      margin-left: auto;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text3);
      font-size: 1.1rem;
      transition: color 0.15s;
      line-height: 1;
    }
    .bookmark-btn:hover { color: var(--amber); }
    .bookmark-btn.bookmarked { color: var(--amber); }

    .strain-name {
      font-family: 'Lora', Georgia, serif;
      font-style: italic;
      font-size: 1.15rem;
      color: var(--text);
      line-height: 1.2;
    }
    .strain-desc {
      font-size: 0.82rem;
      color: var(--text2);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .strain-stats {
      display: flex;
      gap: 1rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
    }
    .stat-item { color: var(--text3); }
    .stat-item span { color: var(--text); font-weight: 500; }
    .terpene-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }
    .terpene-pill {
      font-size: 0.68rem;
      padding: 0.15rem 0.5rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text3);
    }
    .effect-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }
    .effect-tag {
      font-size: 0.68rem;
      padding: 0.15rem 0.5rem;
      background: rgba(94,155,77,.08);
      border: 1px solid rgba(94,155,77,.18);
      border-radius: 20px;
      color: var(--accent);
    }
    .card-footer {
      margin-top: auto;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
      font-size: 0.78rem;
      color: var(--accent);
      cursor: pointer;
    }
    .card-footer:hover { text-decoration: underline; }

    /* ===== SPOTLIGHT ===== */
    .spotlight {
      background: linear-gradient(160deg, #162012 0%, #111A0F 50%, #0D1309 100%);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 3rem 2rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .spotlight::before {
      content: '';
      position: absolute;
      bottom: -40%;
      right: -10%;
      width: 50%;
      height: 120%;
      background: radial-gradient(ellipse, rgba(196,152,64,.04) 0%, transparent 65%);
      pointer-events: none;
    }
    .spotlight-inner {
      max-width: 700px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
      align-items: center;
      text-align: left;
    }
    @media (max-width: 640px) { .spotlight-inner { grid-template-columns: 1fr; gap: 1.5rem; } }
    .spotlight h2 {
      font-family: 'Lora', Georgia, serif;
      font-style: italic;
      font-size: 2rem;
      color: var(--text);
      margin-bottom: 0.75rem;
    }
    .spotlight p { color: var(--text2); font-size: 0.9rem; margin-bottom: 1.5rem; }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .stat-block { padding: 1rem; background: var(--surface2); border-radius: var(--radius); border: 1px solid var(--border); }
    .stat-block .num {
      font-family: 'DM Mono', monospace;
      font-size: 1.6rem;
      font-weight: 500;
      color: var(--accent);
    }
    .stat-block .label { font-size: 0.72rem; color: var(--text3); }

    /* ===== CATALOG PAGE ===== */
    .catalog-layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 2rem;
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem;
    }
    @media (max-width: 768px) { .catalog-layout { grid-template-columns: 1fr; } }
    .catalog-sidebar {
      position: sticky;
      top: 78px;
      height: fit-content;
    }
    .filter-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
    }
    .filter-title {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 1rem;
    }
    .filter-group { margin-bottom: 1.25rem; }
    .filter-group-label { font-size: 0.78rem; font-weight: 600; color: var(--text2); margin-bottom: 0.5rem; }
    .filter-input {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      color: var(--text);
      font-family: 'Raleway', sans-serif;
      font-size: 0.85rem;
      outline: none;
    }
    .filter-input:focus { border-color: var(--accent); }
    .filter-input::placeholder { color: var(--text3); }
    select.filter-input { cursor: pointer; }
    .type-tabs {
      display: flex;
      gap: 0.25rem;
      flex-wrap: wrap;
    }
    .type-tab {
      padding: 0.3rem 0.7rem;
      border-radius: 6px;
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: none;
      color: var(--text2);
      transition: all 0.15s;
    }
    .type-tab.active { border-color: var(--accent); color: var(--accent); background: rgba(94,155,77,.10); }
    .slider-wrap { display: flex; flex-direction: column; gap: 0.4rem; }
    .slider-label { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text3); }
    input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }
    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .results-count { font-size: 0.82rem; color: var(--text3); }

    /* ===== DETAIL PAGE ===== */
    .detail-page { max-width: 1100px; margin: 0 auto; padding: 2rem; }
    .detail-hero {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 2rem;
      margin-bottom: 2.5rem;
    }
    @media (max-width: 768px) { .detail-hero { grid-template-columns: 1fr; } }
    .detail-hero-main {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
    }
    .detail-hero-sidebar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
    }
    .detail-name {
      font-family: 'Lora', Georgia, serif;
      font-style: italic;
      font-size: clamp(2rem, 4vw, 3rem);
      color: var(--text);
      margin: 0.75rem 0 0.5rem;
    }
    .detail-desc { color: var(--text2); font-size: 0.95rem; line-height: 1.65; margin-bottom: 1.5rem; }
    .detail-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .sidebar-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 0.5rem;
    }
    .potency-bar-wrap { margin-bottom: 1rem; }
    .potency-bar-bg {
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 0.3rem;
    }
    .potency-bar-fill {
      height: 100%;
      border-radius: 3px;
    }
    .potency-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.72rem;
      color: var(--text3);
      margin-top: 0.2rem;
      font-family: 'DM Mono', monospace;
    }
    .sidebar-section { margin-bottom: 1.25rem; }
    .tag-cloud { display: flex; flex-wrap: wrap; gap: 0.35rem; }

    /* ===== SECTION CARD ===== */
    .section-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem;
      margin-bottom: 1.5rem;
    }
    .section-card h2 {
      font-family: 'Lora', Georgia, serif;
      font-style: italic;
      font-size: 1.4rem;
      color: var(--text);
      margin-bottom: 1.25rem;
    }

    /* ===== TERPENE CHART ===== */
    .terpene-row {
      display: grid;
      grid-template-columns: 130px 1fr 90px;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.75rem;
    }
    .terpene-name { font-size: 0.85rem; font-weight: 500; color: var(--text2); }
    .terpene-effect { font-size: 0.7rem; color: var(--text3); }
    .terpene-bar-bg { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
    .terpene-bar-fill { height: 100%; border-radius: 4px; background: var(--accent); transition: width 0.6s ease; }
    .terpene-pct { font-family: 'DM Mono', monospace; font-size: 0.78rem; color: var(--text2); text-align: right; }

    /* ===== LINEAGE ===== */
    .lineage-tree {
      display: flex;
      align-items: center;
      gap: 2rem;
      flex-wrap: wrap;
    }
    .lineage-parents { display: flex; flex-direction: column; gap: 1rem; }
    .lineage-node {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      padding: 0.75rem 1.25rem;
      font-size: 0.85rem;
    }
    .lineage-node.offspring {
      border-width: 2px;
      font-family: 'Lora', Georgia, serif;
      font-style: italic;
      font-size: 1.05rem;
    }
    .lineage-node.unknown { color: var(--text3); border-style: dashed; }
    .lineage-connector { font-size: 1.2rem; color: var(--text3); }
    .lineage-link {
      color: inherit;
      text-decoration: underline;
      text-decoration-color: var(--border2);
      text-underline-offset: 3px;
      transition: color 0.2s ease, text-decoration-color 0.2s ease;
    }
    .lineage-link:hover {
      color: var(--accent);
      text-decoration-color: var(--accent);
    }
    .lineage-ext-icon {
      font-size: 0.65em;
      margin-left: 0.2rem;
      opacity: 0.55;
      vertical-align: super;
    }
    .seedfinder-caption {
      font-size: 0.72rem;
      color: var(--text3);
      font-style: italic;
      margin-top: 1rem;
      margin-bottom: 0.5rem;
    }
    .seedfinder-link {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      width: 100%;
      padding: 0.7rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text2);
      text-decoration: none;
      font-size: 0.85rem;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, color 0.2s ease;
    }
    .seedfinder-link:hover {
      border-color: var(--accent);
      color: var(--text);
      box-shadow: 0 0 0 1px var(--accent), 0 4px 14px -6px var(--accent);
    }
    .seedfinder-icon { font-size: 1rem; }
    .seedfinder-arrow { margin-left: auto; opacity: 0.7; font-size: 0.9rem; }

    /* ===== LAB CERT ===== */
    .lab-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 0.75rem;
    }
    .lab-cell {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
    }
    .lab-cell-name { font-size: 0.72rem; color: var(--text3); margin-bottom: 0.2rem; }
    .lab-cell-val { font-family: 'DM Mono', monospace; font-size: 1.1rem; font-weight: 500; color: var(--text); }

    /* ===== DISPENSARY CARD ===== */
    .dispensary-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .dispensary-row-info { flex: 1; min-width: 200px; }
    .dispensary-row-name { font-weight: 600; color: var(--text); margin-bottom: 0.25rem; }
    .dispensary-row-meta { font-size: 0.8rem; color: var(--text3); }
    .dispensary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
    }
    .dispensary-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 1rem; }
    .dispensary-name { font-family: 'Lora', Georgia, serif; font-style: italic; font-size: 1.2rem; color: var(--text); }
    .dispensary-meta { font-size: 0.8rem; color: var(--text3); margin-bottom: 0.5rem; }
    .rating { font-size: 0.82rem; color: var(--amber); font-weight: 600; }
    .strain-chips { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.75rem; }
    .strain-chip {
      font-size: 0.72rem;
      padding: 0.2rem 0.6rem;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 20px;
      color: var(--text2);
      cursor: pointer;
    }
    .strain-chip:hover { color: var(--accent); border-color: var(--accent); }
    .dispensary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1rem;
    }

    /* ===== MAP PLACEHOLDER ===== */
    .map-placeholder {
      height: 260px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 0.5rem;
      color: var(--text3);
      margin-bottom: 1.5rem;
    }
    .map-placeholder .map-icon { font-size: 2.5rem; }
    .map-placeholder p { font-size: 0.85rem; }

    /* ===== TRIP REPORTS ===== */
    .trip-report {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 0.75rem;
    }
    .report-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.5rem; flex-wrap: wrap; }
    .report-user { font-weight: 600; font-size: 0.9rem; }
    .report-meta { font-size: 0.75rem; color: var(--text3); }
    .report-note { font-size: 0.88rem; color: var(--text2); margin: 0.5rem 0; line-height: 1.55; }
    .stars { color: var(--amber); font-size: 0.9rem; }
    .vote-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.25rem 0.6rem;
      font-size: 0.75rem;
      color: var(--text3);
      cursor: pointer;
      transition: all 0.15s;
    }
    .vote-btn:hover { border-color: var(--accent); color: var(--accent); }
    .report-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.25rem;
    }
    .form-group { margin-bottom: 1rem; }
    .form-label { font-size: 0.8rem; font-weight: 600; color: var(--text2); margin-bottom: 0.4rem; display: block; }
    .form-textarea {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.65rem 0.85rem;
      color: var(--text);
      font-family: 'Raleway', sans-serif;
      font-size: 0.9rem;
      resize: vertical;
      outline: none;
    }
    .form-textarea:focus { border-color: var(--accent); }
    .method-select { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .method-btn {
      padding: 0.3rem 0.75rem;
      border-radius: 6px;
      font-size: 0.78rem;
      cursor: pointer;
      border: 1px solid var(--border);
      background: none;
      color: var(--text2);
      transition: all 0.15s;
    }
    .method-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(94,155,77,.10); }
    .star-select { display: flex; gap: 0.25rem; }
    .star-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.3rem;
      color: var(--border2);
      transition: color 0.1s;
    }
    .star-btn.lit { color: var(--amber); }

    /* ===== FINDER PAGE ===== */
    .finder-page { max-width: 1100px; margin: 0 auto; padding: 2rem; }
    .state-filter { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }

    /* ===== LIBRARY PAGE ===== */
    .library-page { max-width: 1100px; margin: 0 auto; padding: 2rem; }
    .library-header { margin-bottom: 2rem; }
    .library-header h1 {
      font-family: 'Lora', Georgia, serif;
      font-style: italic;
      font-size: 2rem;
      color: var(--text);
      margin-bottom: 0.4rem;
    }
    .premium-nudge {
      background: linear-gradient(135deg, rgba(196,152,64,.08), rgba(184,107,80,.03));
      border: 1px solid rgba(196,152,64,.22);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }
    .premium-nudge .nudge-icon { font-size: 1.5rem; }
    .premium-nudge .nudge-text { flex: 1; }
    .premium-nudge .nudge-text h3 { font-size: 0.95rem; font-weight: 600; color: var(--amber); margin-bottom: 0.2rem; }
    .premium-nudge .nudge-text p { font-size: 0.82rem; color: var(--text2); }
    .empty-library {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text3);
    }
    .empty-library .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
    .empty-library h2 { font-size: 1.2rem; color: var(--text2); margin-bottom: 0.5rem; }
    .empty-library p { font-size: 0.88rem; }

    /* ===== EXPLORE PAGE ===== */
    .explore-page { max-width: 1100px; margin: 0 auto; padding: 2rem; }
    .media-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1rem;
      margin-bottom: 3rem;
    }
    .media-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s;
    }
    .media-card:hover { border-color: rgba(94,155,77,.25); transform: translateY(-2px); box-shadow: var(--shadow), var(--glow-green); }
    .media-thumb {
      height: 160px;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }
    .media-body { padding: 1rem; }
    .media-category { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.35rem; }
    .media-title { font-size: 0.9rem; font-weight: 600; color: var(--text); line-height: 1.3; margin-bottom: 0.4rem; }
    .media-meta { font-size: 0.75rem; color: var(--text3); }
    .spotlight-scroll {
      display: flex;
      gap: 0.75rem;
      overflow-x: auto;
      padding-bottom: 0.5rem;
    }
    .spotlight-scroll::-webkit-scrollbar { height: 4px; }
    .spotlight-scroll::-webkit-scrollbar-track { background: var(--border); border-radius: 2px; }
    .spotlight-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
    .spotlight-pill {
      flex-shrink: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.85rem 1.25rem;
      cursor: pointer;
      transition: all 0.15s;
      min-width: 180px;
    }
    .spotlight-pill:hover { border-color: var(--accent); }
    .spotlight-pill .pill-name { font-weight: 600; font-size: 0.9rem; color: var(--text); margin-bottom: 0.2rem; }
    .spotlight-pill .pill-sub { font-size: 0.72rem; color: var(--text3); }

    /* ===== PREMIUM PAGE ===== */
    .premium-page { max-width: 1100px; margin: 0 auto; padding: 2rem; }
    .premium-hero { text-align: center; padding: 2rem 0 3rem; }
    .premium-hero h1 {
      font-family: 'Lora', Georgia, serif;
      font-style: italic;
      font-size: clamp(2rem, 4vw, 3rem);
      color: var(--text);
      margin-bottom: 0.75rem;
    }
    .premium-hero h1 em { color: var(--amber); }
    .premium-hero p { color: var(--text2); max-width: 480px; margin: 0 auto 2rem; }
    .premium-layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 2rem;
      align-items: start;
    }
    @media (max-width: 768px) { .premium-layout { grid-template-columns: 1fr; } }
    .feature-list { display: flex; flex-direction: column; gap: 1rem; }
    .feature-item {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
    }
    .feature-icon { font-size: 1.5rem; flex-shrink: 0; }
    .feature-title { font-weight: 600; font-size: 0.95rem; color: var(--text); margin-bottom: 0.25rem; }
    .feature-desc { font-size: 0.82rem; color: var(--text2); }
    .pricing-card {
      background: linear-gradient(145deg, #1E2818, #1A211A);
      border: 2px solid rgba(196,152,64,.40);
      border-radius: var(--radius);
      padding: 2rem;
      position: sticky;
      top: 78px;
      box-shadow: var(--shadow), var(--glow-amber);
    }
    .pricing-amount {
      font-family: 'DM Mono', monospace;
      font-size: 2.5rem;
      font-weight: 500;
      color: var(--amber);
    }
    .pricing-period { font-size: 0.85rem; color: var(--text3); }
    .pricing-divider { border: none; border-top: 1px solid var(--border); margin: 1.25rem 0; }
    .pricing-features { list-style: none; display: flex; flex-direction: column; gap: 0.6rem; }
    .pricing-features li { font-size: 0.85rem; color: var(--text2); display: flex; gap: 0.5rem; align-items: flex-start; }
    .pricing-features li::before { content: '✓'; color: var(--accent); font-weight: 700; flex-shrink: 0; }
    .compare-table { width: 100%; border-collapse: collapse; margin-top: 0.5rem; }
    .compare-table th { font-size: 0.8rem; font-weight: 600; color: var(--text3); text-align: left; padding: 0.6rem 0.75rem; border-bottom: 1px solid var(--border); }
    .compare-table td { font-size: 0.85rem; padding: 0.6rem 0.75rem; border-bottom: 1px solid var(--border); color: var(--text2); }
    .compare-table td:nth-child(2) { text-align: center; }
    .compare-table td:nth-child(3) { text-align: center; color: var(--amber); }
    .check { color: var(--accent); }
    .cross { color: var(--text3); }

    /* ===== TOAST ===== */
    .toast-container {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 999;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      pointer-events: none;
    }
    .toast {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      padding: 0.75rem 1.25rem;
      font-size: 0.85rem;
      color: var(--text);
      box-shadow: var(--shadow);
      opacity: 1;
      transition: opacity 0.3s;
      pointer-events: auto;
    }
    .toast.fade { opacity: 0; }

    /* ===== BACK BUTTON ===== */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--text2);
      font-size: 0.85rem;
      cursor: pointer;
      background: none;
      border: none;
      margin-bottom: 1.5rem;
      transition: color 0.15s;
    }
    .back-btn:hover { color: var(--accent); }

    /* ===== UTILS ===== */
    .text-accent { color: var(--accent); }
    .text-amber { color: var(--amber); }
    .text-muted { color: var(--text3); }
    .divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
    .flex { display: flex; }
    .gap-sm { gap: 0.5rem; }
    .items-center { align-items: center; }
    .flex-wrap { flex-wrap: wrap; }
    .mt-1 { margin-top: 0.5rem; }
    .mt-2 { margin-top: 1rem; }
    .mb-1 { margin-bottom: 0.5rem; }
    .w-full { width: 100%; }

    /* ===== PAGE HEADER ===== */
    .page-header {
      border-bottom: 1px solid var(--border);
      padding: 2rem 2rem 1.5rem;
      max-width: 1100px;
      margin: 0 auto;
    }
    .page-header h1 {
      font-family: 'Lora', Georgia, serif;
      font-style: italic;
      font-size: 2rem;
      color: var(--text);
      margin-bottom: 0.3rem;
    }
    .page-header p { font-size: 0.9rem; color: var(--text2); }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    /* ===== LEAFLET DARK THEME ===== */
    .leaflet-container { background: #1A211A !important; font-family: Raleway, sans-serif !important; }
    .leaflet-popup-content-wrapper { background: #1A211A !important; color: #E8E2D4 !important; border: 1px solid #3E4D36 !important; border-radius: 12px !important; box-shadow: 0 8px 36px rgba(11,16,10,.55) !important; padding: 0 !important; }
    .leaflet-popup-content { margin: 0 !important; color: #E8E2D4 !important; }
    .leaflet-popup-tip { background: #1A211A !important; border: 1px solid #3E4D36 !important; box-shadow: 0 8px 36px rgba(11,16,10,.55) !important; }
    .leaflet-popup-close-button { color: #A89D85 !important; opacity: 0.6 !important; padding: 6px 8px 0 0 !important; }
    .leaflet-popup-close-button:hover { color: #E8E2D4 !important; opacity: 1 !important; background: transparent !important; }
    .leaflet-control-zoom a { background: #1A211A !important; color: #E8E2D4 !important; border: 1px solid #3E4D36 !important; }
    .leaflet-control-zoom a:hover { background: #2F3A2A !important; color: #C49540 !important; }
    .leaflet-control-attribution { background: rgba(26,33,26,0.7) !important; color: #6D6350 !important; font-size: 0.65rem !important; }
    .leaflet-control-attribution a { color: #A89D85 !important; }

    /* ===== HERO AMBIENT ANIMATIONS ===== */
    .hero-ambient {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }
    .hero > .hero-eyebrow,
    .hero > h1,
    .hero > .hero-sub,
    .hero > .hero-search,
    .hero > .hero-pillars {
      position: relative;
      z-index: 2;
    }

    /* a) Smoke trails */
    .smoke-wisp {
      position: absolute;
      border-radius: 50%;
      filter: blur(40px);
      will-change: transform, opacity;
      mix-blend-mode: screen;
    }
    .smoke-wisp-1 {
      width: 420px; height: 420px;
      top: -8%; left: -6%;
      background: radial-gradient(circle, rgba(232,226,212,0.06) 0%, transparent 70%);
      opacity: 0.50;
      animation: drift 32s ease-in-out infinite alternate;
    }
    .smoke-wisp-2 {
      width: 360px; height: 360px;
      top: 30%; right: -8%;
      background: radial-gradient(circle, rgba(77,139,122,0.07) 0%, transparent 70%);
      opacity: 0.55;
      animation: drift 28s ease-in-out -6s infinite alternate-reverse;
    }
    .smoke-wisp-3 {
      width: 480px; height: 480px;
      bottom: -12%; left: 18%;
      background: radial-gradient(circle, rgba(196,152,64,0.05) 0%, transparent 70%);
      opacity: 0.40;
      animation: drift 38s ease-in-out -14s infinite alternate;
    }
    .smoke-wisp-4 {
      width: 320px; height: 320px;
      top: 12%; left: 42%;
      background: radial-gradient(circle, rgba(94,155,77,0.05) 0%, transparent 70%);
      opacity: 0.45;
      animation: drift 26s ease-in-out -18s infinite alternate-reverse;
    }
    @keyframes drift {
      0%   { transform: translate(0px, 0px) scale(1); }
      50%  { transform: translate(40px, -30px) scale(1.08); }
      100% { transform: translate(-30px, 25px) scale(0.96); }
    }

    /* b) Cannabis fan leaf */
    .hero-leaf {
      position: absolute;
      width: 420px;
      height: 420px;
      top: 50%;
      right: -60px;
      transform-origin: 50% 50%;
      color: #3A5A32;
      opacity: 0.12;
      filter: blur(0.5px);
      animation: leaf-sway 18s ease-in-out infinite alternate, leaf-breathe 9s ease-in-out infinite alternate;
    }
    @keyframes leaf-sway {
      0%   { transform: translateY(-50%) rotate(-3deg); }
      100% { transform: translateY(-50%) rotate(3deg); }
    }
    @keyframes leaf-breathe {
      0%   { opacity: 0.10; }
      100% { opacity: 0.14; }
    }

    /* c) Trichome particles */
    .trichome {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px 2px rgba(196,152,64,0.35), 0 0 20px 4px rgba(196,152,64,0.15);
      opacity: 0;
      will-change: transform, opacity;
    }
    .trichome-1 { left: 10%; bottom: 0;   width: 5px; height: 5px; animation: float 14s ease-in-out  -1s infinite; }
    .trichome-2 { left: 22%; bottom: 0;   width: 7px; height: 7px; animation: float 18s ease-in-out  -5s infinite; }
    .trichome-3 { left: 35%; bottom: 0;   width: 4px; height: 4px; animation: float 12s ease-in-out  -9s infinite; }
    .trichome-4 { left: 48%; bottom: 0;   width: 8px; height: 8px; animation: float 20s ease-in-out  -2s infinite; background: var(--teal); box-shadow: 0 0 10px 2px rgba(77,139,122,0.4); }
    .trichome-5 { left: 62%; bottom: 0;   width: 5px; height: 5px; animation: float 16s ease-in-out -11s infinite; }
    .trichome-6 { left: 75%; bottom: 0;   width: 6px; height: 6px; animation: float 19s ease-in-out  -7s infinite; }
    .trichome-7 { left: 86%; bottom: 0;   width: 4px; height: 4px; animation: float 13s ease-in-out -14s infinite; background: var(--accent); box-shadow: 0 0 10px 2px rgba(94,155,77,0.4); }
    .trichome-8 { left: 92%; bottom: 0;   width: 5px; height: 5px; animation: float 17s ease-in-out  -3s infinite; }
    @keyframes float {
      0%   { transform: translateY(0) translateX(0);   opacity: 0; }
      15%  { opacity: 0.45; }
      50%  { transform: translateY(-220px) translateX(20px); opacity: 0.35; }
      85%  { opacity: 0.25; }
      100% { transform: translateY(-440px) translateX(-15px); opacity: 0; }
    }

    /* d) Slow gradient pulse */
    .hero-glow {
      position: absolute;
      inset: -10%;
      background:
        radial-gradient(circle at 30% 40%, rgba(196,152,64,0.12) 0%, transparent 45%),
        radial-gradient(circle at 70% 60%, rgba(77,139,122,0.10) 0%, transparent 50%),
        radial-gradient(circle at 50% 30%, rgba(94,155,77,0.08) 0%, transparent 55%);
      background-size: 200% 200%;
      mix-blend-mode: screen;
      opacity: 0.55;
      animation: glow-shift 30s ease-in-out infinite alternate;
    }
    @keyframes glow-shift {
      0%   { background-position:   0% 0%, 100% 100%, 50% 0%;   opacity: 0.5; }
      50%  { background-position:  60% 30%, 40% 70%,  20% 80%;  opacity: 0.7; }
      100% { background-position: 100% 100%, 0% 0%,    80% 20%; opacity: 0.55; }
    }

    /* 2) Occasional shimmer sweep */
    .hero-shimmer {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        115deg,
        transparent 30%,
        rgba(232,226,212,0.0) 45%,
        rgba(232,226,212,0.14) 50%,
        rgba(232,226,212,0.0) 55%,
        transparent 70%
      );
      background-size: 250% 250%;
      background-position: -150% -150%;
      mix-blend-mode: screen;
      opacity: 0;
      animation: shimmer 15s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%   { background-position: -150% -150%; opacity: 0; }
      40%  { opacity: 0; }
      55%  { opacity: 0.15; }
      70%  { background-position: 150% 150%;   opacity: 0; }
      100% { background-position: 150% 150%;   opacity: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      .smoke-wisp,
      .hero-leaf,
      .trichome,
      .hero-glow,
      .hero-shimmer {
        animation: none !important;
      }
      .trichome { opacity: 0.25; }
      .hero-shimmer { opacity: 0; }
    }

    /* ============================================================
       v2.1 — EDITORIAL CANNABIS ATELIER OVERLAY
       Cinematic dark luxury layer on top of v2 PNW Forest base.
       Goal: less "AI slop", more boutique magazine.
    ============================================================ */
    :root {
      /* Deepen the canvas, push contrast */
      --bg: #07090A;
      --bg2: #0C0F0D;
      --surface: #11140F;
      --surface2: #181C16;
      --border: #1E2319;
      --border2: #2A3024;
      --text: #ECE7D7;
      --text2: #A39884;
      --text3: #6C6452;
      --ember: #D9A55C;
      --ember-dim: #8E6826;
      --moss: #6CA45A;
      --moss-dim: #3A5A30;
      --shadow: 0 20px 60px rgba(0,0,0,.65);
      --glow-warm: 0 0 80px rgba(217,165,92,.10);
    }
    body { font-family: 'Instrument Sans', 'Raleway', sans-serif; font-weight: 400; letter-spacing: -0.005em; }
    body::before { opacity: 0.045; } /* slightly stronger grain */

    /* ── Editorial type scale (override hero h1, section titles, etc.) ── */
    .hero h1,
    .section-title,
    .detail-name,
    .dispensary-name,
    .section-card h2,
    .spotlight h2,
    .premium-hero h1,
    .library-header h1,
    .page-header h1 {
      font-family: 'Instrument Serif', 'Lora', Georgia, serif;
      font-style: italic;
      font-weight: 400;
      letter-spacing: -0.015em;
      line-height: 1.02;
    }

    /* Tiny mono uppercase eyebrow used throughout — editorial signpost */
    .eyebrow-mono {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'JetBrains Mono', 'DM Mono', monospace;
      font-size: 0.66rem;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text3);
    }
    .eyebrow-mono::before {
      content: "";
      width: 24px; height: 1px;
      background: var(--ember-dim);
    }

    /* ── NAV — quieter, more refined ── */
    .nav {
      background: rgba(7,9,10,.78);
      border-bottom: 1px solid rgba(255,255,255,.04);
      height: 64px;
    }
    .nav-logo {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-size: 1.35rem;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    .nav-logo-mark { color: var(--ember); font-size: 1rem; }
    .nav-link.active { color: var(--ember); background: transparent; }
    .nav-link.active::after {
      content: "";
      display: block;
      height: 1px; margin-top: 4px;
      background: var(--ember);
    }
    .nav-link.premium { color: var(--ember); }
    .nav-avatar {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border2);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.05em;
    }
    .page { padding-top: 64px; }

    /* ===========================================================
       CINEMATIC HERO  (replaces SVG-leaf + smoke-CSS hero ambient)
    =========================================================== */
    .cine-hero {
      position: relative;
      min-height: 86vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 2rem 5rem;
      overflow: hidden;
      isolation: isolate;
      background: #000;
    }
    @media (max-width: 720px) { .cine-hero { min-height: 78vh; padding: 0 1.25rem 3rem; } }
    .cine-hero-img {
      position: absolute;
      inset: 0;
      z-index: 0;
      background: url('img/hero-macro.jpg') center 35% / cover no-repeat;
      transform: scale(1.06);
      animation: kenburns 22s ease-in-out infinite alternate;
      will-change: transform;
    }
    @keyframes kenburns {
      0%   { transform: scale(1.05) translate(0, 0); }
      100% { transform: scale(1.14) translate(-1.5%, -2%); }
    }
    .cine-hero-vignette {
      position: absolute; inset: 0; z-index: 1; pointer-events: none;
      background:
        radial-gradient(ellipse 110% 70% at 50% 28%, transparent 0%, rgba(0,0,0,.25) 55%, rgba(0,0,0,.78) 100%),
        linear-gradient(180deg, rgba(0,0,0,.55) 0%, rgba(0,0,0,.18) 32%, rgba(0,0,0,.45) 70%, var(--bg) 100%);
    }
    .cine-hero-grain {
      position: absolute; inset: 0; z-index: 2; pointer-events: none;
      opacity: 0.08; mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 240px;
    }
    .cine-hero-meta {
      position: absolute;
      top: 5rem; left: 2rem; right: 2rem;
      z-index: 3;
      display: flex; justify-content: space-between; align-items: center;
      color: var(--text2);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.66rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }
    .cine-hero-meta-divider {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(217,165,92,.35), transparent);
      margin: 0 1rem;
    }
    .cine-hero-inner {
      position: relative;
      z-index: 3;
      max-width: 980px;
    }
    .cine-hero-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--ember);
      margin-bottom: 1.5rem;
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
    }
    .cine-hero-eyebrow::before {
      content: "";
      width: 36px; height: 1px; background: var(--ember);
    }
    .cine-hero h1 {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(2.9rem, 8.5vw, 7rem);
      line-height: 0.95;
      letter-spacing: -0.025em;
      color: var(--text);
      margin: 0 0 1.5rem;
      text-shadow: 0 4px 40px rgba(0,0,0,.5);
      max-width: 14ch;
    }
    .cine-hero h1 em {
      font-style: italic;
      color: var(--ember);
    }
    .cine-hero h1 .roman {
      font-style: normal;
      font-family: 'Instrument Sans', sans-serif;
      font-weight: 300;
      font-size: 0.6em;
      vertical-align: 0.18em;
      letter-spacing: -0.01em;
      color: var(--text2);
    }
    .cine-hero-sub {
      max-width: 46ch;
      color: var(--text2);
      font-size: 1.05rem;
      line-height: 1.55;
      margin-bottom: 2.5rem;
      font-weight: 300;
    }
    .cine-hero-actions {
      display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center;
    }
    /* Editorial pill button */
    .btn-cine {
      background: var(--ember);
      color: #14110A;
      padding: 0.85rem 1.5rem;
      border-radius: 999px;
      font-family: 'Instrument Sans', sans-serif;
      font-weight: 500;
      font-size: 0.9rem;
      letter-spacing: -0.005em;
      border: none;
      cursor: pointer;
      transition: transform .25s ease, box-shadow .25s ease, background .25s;
      box-shadow: 0 8px 30px -8px rgba(217,165,92,.5);
    }
    .btn-cine:hover { transform: translateY(-1px); box-shadow: 0 12px 40px -8px rgba(217,165,92,.6); background: #E3B377; }
    .btn-cine-ghost {
      background: transparent;
      color: var(--text);
      padding: 0.82rem 1.4rem;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.18);
      font-family: 'Instrument Sans', sans-serif;
      font-weight: 500;
      font-size: 0.9rem;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: border-color .25s, color .25s, background .25s;
    }
    .btn-cine-ghost:hover { border-color: rgba(255,255,255,.5); background: rgba(255,255,255,.04); }

    /* Hero search — minimal, inline */
    .cine-search {
      display: flex;
      align-items: center;
      max-width: 560px;
      margin-bottom: 1.75rem;
      border-bottom: 1px solid rgba(255,255,255,.22);
      padding-bottom: 0.5rem;
      transition: border-color .25s;
    }
    .cine-search:focus-within { border-color: var(--ember); }
    .cine-search input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Instrument Sans', sans-serif;
      font-size: 1rem;
      padding: 0.4rem 0;
      font-weight: 300;
    }
    .cine-search input::placeholder { color: rgba(236,231,215,.4); font-style: italic; }
    .cine-search button {
      background: none; border: none; color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem; letter-spacing: 0.22em; text-transform: uppercase;
      cursor: pointer; padding: 0.4rem 0.6rem; opacity: 0.7; transition: opacity .2s;
    }
    .cine-search button:hover { opacity: 1; color: var(--ember); }

    /* Scroll hint */
    .cine-hero-scroll {
      position: absolute;
      bottom: 1.5rem;
      right: 2rem;
      z-index: 3;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text3);
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      display: flex; align-items: center; gap: 0.5rem;
    }
    .cine-hero-scroll::after {
      content: ""; width: 1px; height: 36px;
      background: linear-gradient(180deg, var(--text3), transparent);
      animation: scrollHint 2.4s ease-in-out infinite;
    }
    @keyframes scrollHint {
      0%, 100% { transform: scaleY(1); transform-origin: top; opacity: .6; }
      50% { transform: scaleY(0.3); opacity: 1; }
    }

    /* ===========================================================
       MARQUEE — running editorial tag strip
    =========================================================== */
    .cine-marquee {
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      overflow: hidden;
      padding: 1rem 0;
    }
    .cine-marquee-track {
      display: flex;
      gap: 3rem;
      width: max-content;
      animation: marquee 42s linear infinite;
    }
    .cine-marquee-item {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-size: 1.5rem;
      color: var(--text2);
      white-space: nowrap;
      display: inline-flex; align-items: center; gap: 3rem;
    }
    .cine-marquee-item::after {
      content: "✦";
      color: var(--ember);
      font-style: normal;
      font-size: 0.8rem;
    }
    @keyframes marquee {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    /* ===========================================================
       SECTION HEADERS — editorial
    =========================================================== */
    .cine-section {
      max-width: 1240px;
      margin: 0 auto;
      padding: 6rem 2rem;
    }
    @media (max-width: 720px) { .cine-section { padding: 4rem 1.25rem; } }
    .cine-section-head {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 2rem;
      margin-bottom: 3rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .cine-section-head h2 {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(2.2rem, 4.5vw, 3.6rem);
      line-height: 0.98;
      letter-spacing: -0.02em;
      color: var(--text);
      max-width: 16ch;
    }
    .cine-section-head h2 em { color: var(--ember); font-style: italic; }
    .cine-section-head-meta {
      text-align: right;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text3);
      line-height: 1.7;
    }
    .cine-section-head-meta a {
      display: block;
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid var(--ember-dim);
      padding-bottom: 1px;
      margin-top: 0.4rem;
      transition: border-color .2s, color .2s;
      cursor: pointer;
    }
    .cine-section-head-meta a:hover { border-color: var(--ember); color: var(--ember); }

    /* ===========================================================
       THE DROP — full-bleed feature with product image
    =========================================================== */
    .cine-drop {
      position: relative;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      margin: 0;
      background: #000;
      min-height: 640px;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    @media (max-width: 860px) { .cine-drop { grid-template-columns: 1fr; min-height: 0; } }
    .cine-drop-img {
      position: relative;
      background: url('img/hero-product.jpg') center / cover no-repeat;
      min-height: 540px;
      overflow: hidden;
    }
    .cine-drop-img::after {
      content: "";
      position: absolute; inset: 0;
      background: linear-gradient(115deg, transparent 60%, rgba(0,0,0,.5) 100%);
    }
    .cine-drop-img-label {
      position: absolute;
      bottom: 1.5rem; left: 1.5rem;
      z-index: 2;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,.6);
    }
    .cine-drop-body {
      padding: 5rem 4rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 1.25rem;
      background:
        radial-gradient(ellipse 80% 60% at 20% 0%, rgba(217,165,92,.05) 0%, transparent 60%),
        var(--bg);
    }
    @media (max-width: 860px) { .cine-drop-body { padding: 3rem 1.5rem; } }
    .cine-drop-body h3 {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(2.4rem, 5vw, 4.2rem);
      line-height: 0.95;
      letter-spacing: -0.025em;
      color: var(--text);
    }
    .cine-drop-body h3 em { color: var(--ember); }
    .cine-drop-meta-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      margin-top: 0.5rem;
    }
    .cine-drop-meta-grid > div { display: flex; flex-direction: column; gap: 0.2rem; }
    .cine-drop-meta-grid .k {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text3);
    }
    .cine-drop-meta-grid .v {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-size: 1.6rem;
      color: var(--text);
      line-height: 1;
    }
    .cine-drop-body p {
      color: var(--text2);
      font-size: 1rem;
      line-height: 1.6;
      max-width: 44ch;
      font-weight: 300;
    }

    /* ===========================================================
       SMOKE BREAK — atmospheric interstitial
    =========================================================== */
    .cine-smoke {
      position: relative;
      min-height: 360px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 5rem 2rem;
      background: url('img/hero-smoke.jpg') center / cover no-repeat;
      background-color: #000;
      overflow: hidden;
      isolation: isolate;
    }
    .cine-smoke::before {
      content: "";
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,.7) 100%);
      z-index: 0;
    }
    .cine-smoke-inner { position: relative; z-index: 1; max-width: 720px; }
    .cine-smoke blockquote {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(1.6rem, 3.5vw, 2.6rem);
      line-height: 1.2;
      letter-spacing: -0.01em;
      color: var(--text);
      margin: 0;
    }
    .cine-smoke cite {
      display: block;
      margin-top: 1.5rem;
      font-family: 'JetBrains Mono', monospace;
      font-style: normal;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--ember);
    }

    /* ===========================================================
       HANDS / STORIES — editorial split
    =========================================================== */
    .cine-stories {
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 0;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    @media (max-width: 860px) { .cine-stories { grid-template-columns: 1fr; } }
    .cine-stories-body {
      padding: 5rem 4rem;
      display: flex; flex-direction: column; gap: 1.25rem;
      justify-content: center;
    }
    @media (max-width: 860px) { .cine-stories-body { padding: 3rem 1.5rem; } }
    .cine-stories-body h3 {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(2.2rem, 4.5vw, 3.6rem);
      line-height: 0.98;
      letter-spacing: -0.022em;
      color: var(--text);
    }
    .cine-stories-body p {
      color: var(--text2);
      font-size: 1rem;
      line-height: 1.65;
      max-width: 42ch;
      font-weight: 300;
    }
    .cine-stories-img {
      background: url('img/hero-hands.jpg') center / cover no-repeat;
      min-height: 520px;
      position: relative;
    }
    .cine-stories-img-label {
      position: absolute;
      bottom: 1.25rem; right: 1.25rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,.55);
      writing-mode: vertical-rl;
      transform: rotate(180deg);
    }

    /* ===========================================================
       REFINED STRAIN CARDS — quieter, editorial
    =========================================================== */
    .strain-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1.5rem;
      transition: border-color .25s, transform .25s, box-shadow .25s;
    }
    .strain-card::after { display: none; } /* drop the per-card grain — too busy */
    .strain-card:hover {
      border-color: rgba(217,165,92,.35);
      transform: translateY(-3px);
      box-shadow: 0 30px 60px -30px rgba(0,0,0,.6), 0 0 0 1px rgba(217,165,92,.06);
    }
    .strain-card .strain-name {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-weight: 400;
      font-size: 1.45rem;
      letter-spacing: -0.015em;
      line-height: 1.1;
    }
    .strain-card .card-footer {
      color: var(--ember);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding-top: 1rem;
    }
    .strain-card .card-footer:hover { color: var(--text); }
    .strain-grid { gap: 1.5rem; }

    .badge {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 400;
      font-size: 0.58rem;
      letter-spacing: 0.18em;
      padding: 0.22rem 0.55rem;
      border-radius: 2px;
      background: transparent;
      border: 1px solid currentColor;
    }
    .badge-indica { color: #c08ce8; border-color: rgba(192,140,232,.35); }
    .badge-sativa { color: #8ED68A; border-color: rgba(142,214,138,.35); }
    .badge-hybrid { color: var(--ember); border-color: rgba(217,165,92,.35); }
    .badge-cbd    { color: #7ec0d8; border-color: rgba(126,192,216,.35); }
    .badge-accent { color: var(--moss); border-color: rgba(108,164,90,.35); }
    .badge-amber  { color: var(--ember); border-color: rgba(217,165,92,.35); }

  <!-- Scroll motion engine — IntersectionObserver reveals + rAF parallax -->
  <script>
  (function(){
    const state = {
      io: null,
      parallaxTargets: [],
      ticking: false,
      lastY: 0,
    };

    function ensureObserver() {
      if (state.io) return state.io;
      state.io = new IntersectionObserver((entries) => {
        entries.forEach(en => {
          if (en.isIntersecting) {
            en.target.classList.add('is-visible');
            // one-shot for reveals
            if (en.target.dataset.revealOnce !== 'false') {
              state.io.unobserve(en.target);
            }
          }
        });
      }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });
      return state.io;
    }

    function onScroll() {
      if (state.ticking) return;
      state.ticking = true;
      requestAnimationFrame(() => {
        const y = window.scrollY;
        state.lastY = y;
        // progress bar
        const docH = Math.max(1, document.documentElement.scrollHeight - window.innerHeight);
        const pct = Math.min(100, Math.max(0, (y / docH) * 100));
        document.documentElement.style.setProperty('--progress', pct.toFixed(2) + '%');
        document.documentElement.style.setProperty('--scroll-y', y + 'px');
        // parallax
        for (const el of state.parallaxTargets) {
          const r = el.getBoundingClientRect();
          if (r.bottom < -200 || r.top > window.innerHeight + 200) continue;
          const speed = parseFloat(el.dataset.parallax) || 0.18;
          // distance from viewport center
          const center = r.top + r.height / 2;
          const offset = (center - window.innerHeight / 2) * speed * -1;
          el.style.transform = `translate3d(0, ${offset.toFixed(1)}px, 0) scale(${el.dataset.parallaxScale || 1.08})`;
        }
        state.ticking = false;
      });
    }

    function scan() {
      ensureObserver();
      // Observe new reveals
      document.querySelectorAll('.reveal:not(.is-visible), .reveal-left:not(.is-visible), .reveal-right:not(.is-visible), .reveal-card:not(.is-visible), .reveal-letters:not(.is-visible)').forEach(el => {
        state.io.observe(el);
      });
      // Sticky labels and section visibility (so .cine-stories.is-visible style triggers)
      document.querySelectorAll('.cine-stories:not(.is-visible), .cine-drop:not(.is-visible)').forEach(el => {
        state.io.observe(el);
      });
      // Parallax targets
      state.parallaxTargets = Array.from(document.querySelectorAll('[data-parallax]'));
      // Letter-cascade — set --i index on each .lt
      document.querySelectorAll('.reveal-letters').forEach(group => {
        if (group.dataset._lettered) return;
        group.querySelectorAll('.lt').forEach((el, i) => el.style.setProperty('--i', i));
        group.dataset._lettered = '1';
      });
      onScroll();
    }

    window.__scrollEngine = { scan };

    // Bind once
    if (!window.__scrollEngineBound) {
      window.addEventListener('scroll', onScroll, { passive: true });
      window.addEventListener('resize', onScroll);
      window.__scrollEngineBound = true;
    }
  })();
  </script>

    /* ===================================================
       STRAIN CARD
    =================================================== */
    function StrainCard({ strain, bookmarks, setBookmarks, navigate, toast }) {
      const isBookmarked = bookmarks.has(strain.id);
      function toggleBookmark(e) {
        e.stopPropagation();
        const next = new Set(bookmarks);
        if (isBookmarked) {
          next.delete(strain.id);
          toast('Removed from library');
        } else {
          next.add(strain.id);
          toast('Saved to library ✓');
        }
        setBookmarks(next);
      }
      // map strain.type → tint key
      const tint = strain.cbd >= 5 ? 'cbd' : (strain.type === 'sativa' ? 'sativa' : strain.type === 'indica' ? 'indica' : 'hybrid');
      const dropNo = String(STRAINS.findIndex(s => s.id === strain.id) + 1).padStart(2, '0');
      return (
        <div className="strain-card reveal-card" data-tint={tint} onClick={() => navigate({ page: 'strain', id: strain.id })}>
          <div className="strain-card-art" aria-hidden="true">
            <div className="strain-card-art-inner">
              <div className="strain-card-top">
                <span className="strain-card-art-label">Nº {dropNo}</span>
                <button className={`bookmark-btn${isBookmarked ? ' bookmarked' : ''}`} onClick={toggleBookmark} aria-label="Bookmark strain">
                  {isBookmarked ? '♥' : '♡'}
                </button>
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: '0.45rem' }}>
                <div className="strain-dot" style={{ background: strain.color, color: strain.color }} />
                <span className={typeBadgeClass(strain.type)}>{strain.type}</span>
              </div>
            </div>
          </div>
          <div className="strain-card-body">
            <div className="strain-name">{strain.name}</div>
            <div className="strain-desc">{strain.description}</div>
            <div className="strain-stats">
              <span className="stat-item">THC <span>{strain.thc}%</span></span>
              <span className="stat-item">CBD <span>{strain.cbd}%</span></span>
              <span className="stat-item">♥ <span>{strain.likeCount.toLocaleString()}</span></span>
            </div>
            <div className="terpene-pills">
              {strain.terpenes.slice(0, 2).map(t => (
                <span key={t.name} className="terpene-pill">{t.name}</span>
              ))}
            </div>
            <div className="effect-tags">
              {strain.effects.slice(0, 3).map(e => (
                <span key={e} className="effect-tag">{e}</span>
              ))}
            </div>
            <div className="card-footer">View Details →</div>
          </div>
        </div>
      );
    }

    /* ===================================================
       CATALOG PAGE
    =================================================== */
    function CatalogPage({ navigate, bookmarks, setBookmarks, route, toast }) {
      const [search, setSearch] = useState(route.query || '');
      const [type, setType] = useState('all');
      const [effect, setEffect] = useState('');
      const [minThc, setMinThc] = useState(0);
      const [sortBy, setSortBy] = useState('likes');

      const allEffects = useMemo(() => {
        const set = new Set();
        STRAINS.forEach(s => s.effects.forEach(e => set.add(e)));
        return [...set].sort();
      }, []);

      const filtered = useMemo(() => {
        let list = [...STRAINS];
        if (search) list = list.filter(s => s.name.toLowerCase().includes(search.toLowerCase()) || s.description.toLowerCase().includes(search.toLowerCase()));
        if (type !== 'all') list = list.filter(s => s.type === type);
        if (effect) list = list.filter(s => s.effects.includes(effect));
        if (minThc > 0) list = list.filter(s => s.thc >= minThc);
        if (sortBy === 'likes') list.sort((a, b) => b.likeCount - a.likeCount);
        else if (sortBy === 'thc') list.sort((a, b) => b.thc - a.thc);
        else list.sort((a, b) => a.name.localeCompare(b.name));
        return list;
      }, [search, type, effect, minThc, sortBy]);

      function clearFilters() {
        setSearch(''); setType('all'); setEffect(''); setMinThc(0); setSortBy('likes');
      }

      return (
        <div className="page">
          <div className="catalog-layout">
            <aside className="catalog-sidebar">
              <div className="filter-card">
                <div className="filter-title">Filter Strains</div>
                <div className="filter-group">
                  <div className="filter-group-label">Search</div>
                  <input className="filter-input" placeholder="Name or description…" value={search} onChange={e => setSearch(e.target.value)} />
                </div>
                <div className="filter-group">
                  <div className="filter-group-label">Type</div>
                  <div className="type-tabs">
                    {['all', 'indica', 'sativa', 'hybrid'].map(t => (
                      <button key={t} className={`type-tab${type === t ? ' active' : ''}`} onClick={() => setType(t)}>
                        {t.charAt(0).toUpperCase() + t.slice(1)}
                      </button>
                    ))}
                  </div>
                </div>
                <div className="filter-group">
                  <div className="filter-group-label">Effect</div>
                  <select className="filter-input" value={effect} onChange={e => setEffect(e.target.value)}>
                    <option value="">Any effect</option>
                    {allEffects.map(e => <option key={e} value={e}>{e}</option>)}
                  </select>
                </div>
                <div className="filter-group">
                  <div className="filter-group-label">Min THC %</div>
                  <div className="slider-wrap">
                    <div className="slider-label"><span>0%</span><span>{minThc}%</span></div>
                    <input type="range" min="0" max="30" value={minThc} onChange={e => setMinThc(Number(e.target.value))} />
                  </div>
                </div>
                <div className="filter-group">
                  <div className="filter-group-label">Sort By</div>
                  <select className="filter-input" value={sortBy} onChange={e => setSortBy(e.target.value)}>
                    <option value="likes">Most Liked</option>
                    <option value="thc">Highest THC</option>
                    <option value="alpha">A–Z</option>
                  </select>
                </div>
                <button className="btn btn-ghost w-full btn-sm" onClick={clearFilters}>Clear Filters</button>
              </div>
            </aside>
            <main>
              <div className="results-header">
                <span className="results-count">{filtered.length} strain{filtered.length !== 1 ? 's' : ''} found</span>
              </div>
              {filtered.length === 0 ? (
                <div className="empty-library" style={{ padding: '3rem 0' }}>
                  <div className="empty-icon">🔍</div>
                  <h2>No strains match your filters</h2>
                  <p>Try adjusting your search or clearing filters.</p>
                </div>
              ) : (
                <div className="strain-grid">
                  {filtered.map(s => (
                    <StrainCard key={s.id} strain={s} bookmarks={bookmarks} setBookmarks={setBookmarks} navigate={navigate} toast={toast} />
                  ))}
                </div>
              )}
            </main>
          </div>
        </div>
      );
    }

    /* ===================================================

    =================================================== */
    function makeMarkerSvg(color) {
      return 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(
        '<svg width="28" height="36" viewBox="0 0 28 36" xmlns="http://www.w3.org/2000/svg">' +
        '<path d="M14 0C6.27 0 0 6.27 0 14C0 24.5 14 36 14 36C14 36 28 24.5 28 14C28 6.27 21.73 0 14 0Z" fill="' + color + '" fill-opacity="0.93"/>' +
        '<circle cx="14" cy="14" r="7" fill="#E8E2D4" fill-opacity="0.9"/>' +
        '<circle cx="14" cy="14" r="3.5" fill="' + color + '"/>' +
        '</svg>'
      );
    }

    function DispensaryMap({ dispensaries, selected, onSelect }) {
      const containerRef = useRef(null);
      const mapRef = useRef(null);
      const markersRef = useRef({});

      useEffect(() => {
        if (!containerRef.current || !window.L) return;

        const map = window.L.map(containerRef.current, { zoomControl: true }).setView([46.7, -122.4], 7);
        mapRef.current = map;

        window.L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
          attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
          subdomains: 'abcd',
          maxZoom: 19,
        }).addTo(map);

        dispensaries.forEach(function(d) {
          const icon = window.L.icon({
            iconUrl: makeMarkerSvg('#5E9B4D'),
            iconSize: [28, 36],
            iconAnchor: [14, 36],
            popupAnchor: [0, -36],
          });

          const popupHtml =
            '<div style="background:#1A211A;color:#E8E2D4;padding:10px 14px;border-radius:10px;font-family:Raleway,sans-serif;line-height:1.5;min-width:180px">' +
            '<div style="font-weight:600;font-size:0.9rem;margin-bottom:3px">' + d.name + '</div>' +
            '<div style="color:#A89D85;font-size:0.77rem">' + d.address + ', ' + d.city + ' ' + d.state + '</div>' +
            '<div style="color:#6D6350;font-size:0.73rem;margin-top:2px">' + d.hours + '</div>' +
            '<div style="color:#C49540;font-size:0.78rem;margin-top:4px;font-weight:600">★ ' + d.rating + '</div>' +
            '</div>';

          const marker = window.L.marker([d.coordinates.lat, d.coordinates.lng], { icon: icon, title: d.name })
            .addTo(map)
            .bindPopup(popupHtml);

          marker.on('click', function() {
            onSelect(d.id);
          });

          markersRef.current[d.id] = marker;
        });

        return function() {
          if (mapRef.current) {
            mapRef.current.remove();
            mapRef.current = null;
          }
          markersRef.current = {};
        };
      }, []);

      useEffect(function() {
        if (!mapRef.current || !window.L) return;
        Object.entries(markersRef.current).forEach(function([id, marker]) {
          const isSelected = id === selected;
          marker.setIcon(window.L.icon({
            iconUrl: makeMarkerSvg(isSelected ? '#C49540' : '#5E9B4D'),
            iconSize: isSelected ? [34, 44] : [28, 36],
            iconAnchor: isSelected ? [17, 44] : [14, 36],
            popupAnchor: isSelected ? [0, -44] : [0, -36],
          }));
        });
        if (selected && markersRef.current[selected]) {
          const sel = markersRef.current[selected];
          sel.openPopup();
          const ll = sel.getLatLng();
          mapRef.current.panTo([ll.lat, ll.lng]);
        }
      }, [selected]);

      return (
        <div
          ref={containerRef}
          style={{
            width: '100%',
            height: '340px',
            borderRadius: 'var(--radius)',
            border: '1px solid var(--border)',
            marginBottom: '1.5rem',
            overflow: 'hidden',
            background: 'var(--surface)',
          }}
        />
      );
    }

            </div>

    /* ===================================================
       EXPLORE PAGE

    }

    /* ===================================================
       PREMIUM PAGE

        { icon: '🔔', title: 'Strain Alerts', desc: 'Get notified when a saved strain comes back in stock at a nearby dispensary.' },
        { icon: '📊', title: 'Consumption Log', desc: 'Track your sessions over time. See patterns in what works best for you.' },
        { icon: '📥', title: 'Export Lab Data', desc: 'Download full COA PDFs for any strain in the catalog. Shareable, printable.' },
        { icon: '🗺️', title: 'Live Inventory Map', desc: 'See real-time stock across all PNW dispensaries on a live interactive map.' },

                Untapped Market Premium
