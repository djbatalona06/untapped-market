            </div>
            <div className="premium-layout">
              <div>
                <div className="feature-list">
                  {features.map(f => (
                    <div key={f.title} className="feature-item">
                      <div className="feature-icon">{f.icon}</div>
                      <div>
                        <div className="feature-title">{f.title}</div>

                </div>
                <div className="section-card" style={{ marginTop: '2rem' }}>
                  <div style={{ fontFamily: 'Lora, Georgia, serif', fontStyle: 'italic', fontSize: '1.2rem', color: 'var(--text)', marginBottom: '1rem' }}>Free vs Premium</div>

                        <th>Feature</th>
                        <th>Free</th>

                    <tbody>

                        ['Strain Catalog', true, true],
                        ['Dispensary Finder', true, true],

                  <button className="btn btn-ghost w-full btn-sm">Continue with Free</button>

    /* ===================================================
       APP ROUTER
    =================================================== */
    function App() {
      const [route, setRoute] = useState({ page: 'home' });
      const [bookmarks, setBookmarks] = useState(new Set());
      const [toasts, setToasts] = useState([]);

      // ── Tweaks state — visual variants editable from the toolbar ──
      const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
        "heroImage": "macro",
        "heroMotion": true,
        "parallax": 1,
        "accent": "#8FB85F",
        "marqueeSpeed": 42
      }/*EDITMODE-END*/;
      const [tw, setTwState] = useState(TWEAK_DEFAULTS);
      const setTweak = useCallback((keyOrEdits, val) => {
        const edits = (typeof keyOrEdits === 'object' && keyOrEdits !== null)
          ? keyOrEdits : { [keyOrEdits]: val };
        setTwState(prev => ({ ...prev, ...edits }));
        try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*'); } catch (e) {}
      }, []);

      // Apply tweaks as CSS vars + hero image swap
      useEffect(() => {
        const heroMap = {
          macro:   "url('img/hero-macro.jpg') center 35% / cover no-repeat",
          hands:   "url('img/hero-hands.jpg') center 40% / cover no-repeat",
          product: "url('img/hero-product.jpg') center 30% / cover no-repeat",
          smoke:   "url('img/hero-smoke.jpg') center 45% / cover no-repeat",
        };
        const root = document.documentElement;
        root.style.setProperty('--ember', tw.accent || '#D9A55C');
        root.style.setProperty('--marquee-dur', (tw.marqueeSpeed || 42) + 's');
        // hero image — set on the actual element since it's a background shorthand
        const heroEl = document.querySelector('.cine-hero-img');
        if (heroEl) heroEl.style.background = heroMap[tw.heroImage] || heroMap.macro;
        // motion toggle — pause ken-burns
        if (heroEl) heroEl.style.animationPlayState = tw.heroMotion ? 'running' : 'paused';
        // parallax intensity — scale via CSS var read in the engine? Easier: update each data-parallax
        document.querySelectorAll('[data-parallax][data-parallax-base]').forEach(el => {
          el.dataset.parallax = (parseFloat(el.dataset.parallaxBase) * (tw.parallax || 1)).toString();
        });
        // Re-scan motion targets after any DOM/tweak change
        if (window.__scrollEngine) window.__scrollEngine.scan();
      }, [tw.heroImage, tw.heroMotion, tw.parallax, tw.accent, tw.marqueeSpeed, route.page]);

      // Capture original parallax values on first mount so the slider can scale relative to them
      useEffect(() => {
        document.querySelectorAll('[data-parallax]').forEach(el => {
          if (!el.dataset.parallaxBase) el.dataset.parallaxBase = el.dataset.parallax;
        });
      });

      function navigate(newRoute) {
        setRoute(newRoute);
        window.scrollTo(0, 0);
      }

      function addToast(msg) {
        const id = Date.now();
        setToasts(prev => [...prev, { id, msg, fading: false }]);
        setTimeout(() => {
          setToasts(prev => prev.map(t => t.id === id ? { ...t, fading: true } : t));
          setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 350);
        }, 2500);
      }

      function renderPage() {
        const props = { navigate, bookmarks, setBookmarks, toast: addToast, route };
        switch (route.page) {
          case 'home': return <HomePage {...props} />;
          case 'catalog': return <CatalogPage {...props} />;
          case 'strain': return <StrainDetailPage strainId={route.id} {...props} />;
          case 'finder': return <FinderPage {...props} />;
          case 'library': return <LibraryPage {...props} />;
          case 'explore': return <ExplorePage {...props} />;
          case 'premium': return <PremiumPage {...props} />;
          default: return <HomePage {...props} />;
        }
      }

      // Re-scan scroll targets after each route change
      useEffect(() => {
        const id = setTimeout(() => window.__scrollEngine && window.__scrollEngine.scan(), 60);
        return () => clearTimeout(id);
      }, [route]);

      const TweaksPanel = window.TweaksPanel;
      const TweakSection = window.TweakSection;
      const TweakRadio = window.TweakRadio;
      const TweakSelect = window.TweakSelect;
      const TweakToggle = window.TweakToggle;
      const TweakSlider = window.TweakSlider;
      const TweakColor = window.TweakColor;

      return (
        <>
          <Nav route={route} navigate={navigate} />
          <div className="scroll-progress" aria-hidden="true"></div>
          {renderPage()}
          <ToastContainer toasts={toasts} />
          {TweaksPanel && (
            <TweaksPanel title="Tweaks" defaultPosition={{ right: 24, bottom: 24 }}>
              <TweakSection title="Hero">
                <TweakSelect
                  label="Hero image"
                  value={tw.heroImage}
                  onChange={v => setTweak('heroImage', v)}
                  options={[
                    { value: 'macro',   label: 'Macro bud (current)' },
                    { value: 'product', label: 'Apothecary jar' },
                    { value: 'hands',   label: 'Hands & cabin' },
                    { value: 'smoke',   label: 'Smoke void' },
                  ]}
                />
                <TweakToggle
                  label="Ken-burns motion"
                  value={tw.heroMotion}
                  onChange={v => setTweak('heroMotion', v)}
                />
              </TweakSection>
              <TweakSection title="Scroll motion">
                <TweakSlider
                  label="Parallax intensity"
                  min={0} max={2} step={0.05}
                  value={tw.parallax}
                  onChange={v => setTweak('parallax', v)}
                />
                <TweakSlider
                  label="Marquee duration (s)"
                  min={12} max={90} step={2}
                  value={tw.marqueeSpeed}
                  onChange={v => setTweak('marqueeSpeed', v)}
                />
              </TweakSection>
              <TweakSection title="Accent">
                <TweakColor
                  label="Ember"
                  value={tw.accent}
                  onChange={v => setTweak('accent', v)}
                  options={['#D9A55C', '#C9893D', '#E8C277', '#B97A4B', '#8FB85F']}
                />
              </TweakSection>
            </TweaksPanel>
          )}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
