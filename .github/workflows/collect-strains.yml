name: Collect strain data (daily)

# Deterministic, $0-token daily refresh of strain/dispensary JSON.
# Runs the collector, validates, and (if anything changed) opens a DRAFT PR for review.
# Nothing reaches `main` — and therefore production — without a human merge.
#
# Strain sources are public + fetch-safe and ENABLED BY DEFAULT (no config needed):
#   OpenTHC VDB (identity/type) + grow_data (THC/CBD, sativa/indica). No API key.
# Optional overrides via repository VARIABLES (Settings → Secrets and variables → Actions):
#   OPENTHC_VDB_URL  GROW_DATA_CSV_URL  (set to "off" to disable a source)
#   WA_LCB_DATA_URL  OR_OLCC_DATA_URL   (open-gov dispensary data; unset = skip)

on:
  schedule:
    - cron: '0 9 * * *'   # daily, 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Collect data
        env:
          OPENTHC_VDB_URL: ${{ vars.OPENTHC_VDB_URL }}
          GROW_DATA_CSV_URL: ${{ vars.GROW_DATA_CSV_URL }}
          WA_LCB_DATA_URL: ${{ vars.WA_LCB_DATA_URL }}
          OR_OLCC_DATA_URL: ${{ vars.OR_OLCC_DATA_URL }}
          STRAINS_DATA_URL: ${{ vars.STRAINS_DATA_URL }}
        run: npm run collect

      - name: Validate data (schema)
        run: npm run validate:data

      - name: Validate PNW availability
        run: npm run validate:pnw

      - name: Open draft PR with any data changes
        uses: peter-evans/create-pull-request@v6
        with:
          branch: data/auto-update
          base: main
          draft: true
          commit-message: "data: daily strain/dispensary refresh"
          title: "Daily data refresh"
          body: |
            Automated daily refresh of `src/data/strains.json` and
            `src/data/dispensaries.json` via `scripts/collect.mjs`.

            Deterministic, no LLM tokens used. Review the diff and merge to deploy.
          add-paths: |
            src/data/strains.json
            src/data/dispensaries.json
